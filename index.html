<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Tip calculator app</title>
</head>

<body>
  <img src="images/logo.svg" alt="Logo image" class="logo">
  <main class="container">
    <section class="inputData">
      <h2>Bill</h2>
      <form>
        <div class="input-box">
          <img src="images/icon-dollar.svg">
          <input class="billInput" type="number" placeholder="0">
        </div>

        <div class="select-tip">
          <h2>Select Tip %</h2>
          <div class="buttons">
            <button>5%</button>
            <button>10%</button>
            <button>15%</button>
            <button>25%</button>
            <button>50%</button>
            <button class="customBtn">Custom</button>
          </div>
        </div>

        <div class="numberOfPeople">
          <div class="label">
            <h2>Number of People</h2>
            <span class="error">Can't be zero</span>
          </div>
          <div class="input-box">
            <img src="images/icon-person.svg">
            <input class="numberOfPeopleInput" type="number" placeholder="0">
          </div>
        </div>
      </form>
    </section>

    <section class="tipCalculation">
      <div class="tip-data">
        <div class="headings">
          <h2>Tip Amount</h2>
          <p>/ person</p>
        </div>

        <div class="price">
          <h2 class="tipAmount">$0.00</h2>
        </div>
      </div>


      <div class="tip-data">
        <div class="headings">
          <h2>Total</h2>
          <p>/ person</p>
        </div>

        <div class="price">
          <h2 class="totalAmount">$0.00</h2>
        </div>
      </div>

      <button type="button" class="reset">RESET</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
